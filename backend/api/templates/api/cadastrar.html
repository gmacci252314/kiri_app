<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Tradução</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-4">Cadastrar Nova Tradução</h3>

        {% if erro %}
        <div class="alert alert-danger">
        {{ erro }}
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Kiriri</label>
                <input type="text" name="idioma_kiriri" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Português</label>
                <input type="text" name="idioma_portugues" class="form-control" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    Salvar
                </button>

                <a href="{% url 'traducao_list' %}" class="btn btn-secondary">
                    Voltar
                </a>
            </div>

        </form>

    </div>

</body>
</html>
