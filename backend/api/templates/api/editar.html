<!DOCTYPE html>
<html>
<head>
    <title>Editar Tradução</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>Editar Tradução</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Kiriri</label>
            <input type="text" name="idioma_kiriri" class="form-control"
                   value="{{ traducao.idioma_kiriri }}">
        </div>

        <div class="mb-3">
            <label>Português</label>
            <input type="text" name="idioma_portugues" class="form-control"
                   value="{{ traducao.idioma_portugues }}">
        </div>

        <button class="btn btn-primary">Salvar</button>

        <a href="{% url 'traducao_list' %}" class="btn btn-secondary">
            Voltar
        </a>
    </form>

</body>
</html>
