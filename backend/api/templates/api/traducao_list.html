<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Tradutor Kiriri</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">
            Tradutor Kiriri
        </h2>

        <div class="row mb-3">

            <div class="col-md-8">

                <form method="GET">
                    <div class="row mb-3">

                        <div class="col-md-8">
                            <input type="text" name="q" class="form-control" placeholder="Pesquisar palavra..."
                                value="{{ consulta }}">
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                🔍 Pesquisar
                            </button>
                        </div>

                        <div class="col-md-2 text-end">
                            <a href="{% url 'cadastrar' %}" class="btn btn-success mb-3">
                                Cadastrar Nova Tradução
                            </a>
                        </div>

                    </div>
                </form>

            </div>

        </div>

        <table class="table table-striped table-hover table-bordered">

            <thead class="table-success">

                <tr>

                    <th>Kiriri</th>

                    <th>Português</th>

                    <th width="180">Ações</th>

                </tr>

            </thead>

            <tbody>

                {% for item in traducoes %}

                <tr>

                    <td>{{ item.idioma_kiriri }}</td>

                    <td>{{ item.idioma_portugues }}</td>

                    <td>

                        <button class="btn btn-info btn-sm">
                            👁
                        </button>

                        <a href="{% url 'editar' item.id %}" class="btn btn-warning btn-sm">
                            Editar
                        </a>
                        

                        <a href="{% url 'deletar' item.id %}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Tem certeza que deseja excluir?')">
                            Deletar
                        </a>
                       

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
